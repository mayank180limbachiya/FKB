{% extends "servicesupport/layout.html" %}
{% block title %}Change Password — Service Support{% endblock %}
{% block body %}
{% load static %}

<script>
  function showPass(id) {
    const f = document.getElementById(id);
    f.type = f.type === 'password' ? 'text' : 'password';
  }
</script>

<div class="min-h-[calc(100vh-56px)] flex items-center justify-center bg-slate-50 px-4 py-10">
  <div class="w-full max-w-sm">

    <div class="flex items-center justify-center gap-6 mb-8">
      <img src="{% static 'servicesupport/oneFanuc.png' %}" alt="FANUC" class="h-8 sm:h-10 object-contain opacity-80">
      <div class="w-px h-7 bg-slate-200"></div>
      <img src="{% static 'servicesupport/Service First Logo.png' %}" alt="Service First" class="h-8 sm:h-10 object-contain opacity-80">
    </div>

    <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
      <div class="px-6 sm:px-8 pt-6 sm:pt-8 pb-5 sm:pb-6">
        <p class="font-mono text-xs text-brand-yellow tracking-widest uppercase mb-1">Account</p>
        <h1 class="text-lg sm:text-xl font-semibold text-brand-dark mb-6">Change Password</h1>

        <form method="POST" action="{% url 'changepassword' %}" autocomplete="off">
          {% csrf_token %}

          <!-- Old Password -->
          <div class="mb-4">
            <label class="block text-xs font-mono text-slate-500 uppercase tracking-widest mb-1.5">Old Password</label>
            <div class="relative">
              <input type="password" name="old_password" id="old_password" maxlength="50" required autofocus
                class="w-full rounded-lg border border-slate-200 bg-slate-50 px-3 py-2.5 pr-11 text-brand-dark font-mono placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-brand-yellow focus:border-transparent transition"
                placeholder="Current password">
              <button type="button" onclick="showPass('old_password')"
                class="absolute right-3 top-1/2 -translate-y-1/2 min-w-[28px] min-h-[28px] flex items-center justify-center text-slate-400 hover:text-brand-dark transition">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
              </button>
            </div>
          </div>

          <!-- New Password -->
          <div class="mb-4">
            <label class="block text-xs font-mono text-slate-500 uppercase tracking-widest mb-1.5">New Password</label>
            <div class="relative">
              <input type="password" name="new_password" id="new_password" maxlength="50" required
                class="w-full rounded-lg border border-slate-200 bg-slate-50 px-3 py-2.5 pr-11 text-brand-dark font-mono placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-brand-yellow focus:border-transparent transition"
                placeholder="New password">
              <button type="button" onclick="showPass('new_password')"
                class="absolute right-3 top-1/2 -translate-y-1/2 min-w-[28px] min-h-[28px] flex items-center justify-center text-slate-400 hover:text-brand-dark transition">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
              </button>
            </div>
          </div>

          <!-- Confirm Password -->
          <div class="mb-6">
            <label class="block text-xs font-mono text-slate-500 uppercase tracking-widest mb-1.5">Confirm New Password</label>
            <div class="relative">
              <input type="password" name="renew_password" id="renew_password" maxlength="50" required
                class="w-full rounded-lg border border-slate-200 bg-slate-50 px-3 py-2.5 pr-11 text-brand-dark font-mono placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-brand-yellow focus:border-transparent transition"
                placeholder="Re-enter new password">
              <button type="button" onclick="showPass('renew_password')"
                class="absolute right-3 top-1/2 -translate-y-1/2 min-w-[28px] min-h-[28px] flex items-center justify-center text-slate-400 hover:text-brand-dark transition">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
              </button>
            </div>
          </div>

          <button type="submit"
            class="w-full min-h-[44px] bg-brand-dark text-brand-yellow font-mono font-bold text-sm py-3 rounded-lg hover:bg-brand-yellow hover:text-brand-dark transition border border-brand-yellow">
            Update Password →
          </button>
        </form>
      </div>

      <div class="px-6 sm:px-8 py-4 bg-slate-50 border-t border-slate-100 text-center">
        <a href="{% url 'index' %}" class="text-xs text-slate-400 hover:text-brand-dark transition">← Back to Home</a>
      </div>
    </div>

    <p class="text-center text-xs text-slate-400 mt-5 font-mono">© 2024 Service Support — FANUC India</p>
  </div>
</div>

{% endblock %}
