{% extends "servicesupport/layout.html" %}

{% block body %}
{% load static %}

<section class="h-100">
    <div class="container h-100">
        <div class="row justify-content-sm-center h-100">
            <div class="col-xxl-4 col-xl-5 col-lg-5 col-md-7 col-sm-9">
                <div class="row">
                    <div class="col">
                        <div class="text-center my-5">
                            <img src="{% static 'servicesupport/oneFanuc.png' %}" alt="logo" width="150">
                        </div>
                    </div>
                    <div class="col">    
                        <div class="text-center my-5">
                            <img src="{% static 'servicesupport/Service First Logo.png' %}" alt="logo" width="200">
                        </div>
                    </div>
                </div>        
                <div class="card shadow-lg">
                    <div class="card-body p-5">
                        <h1 class="fs-4 card-title fw-bold mb-4">Change Password</h1>
                        
                        <form method="POST" class="needs-validation" novalidate="" autocomplete="off" action="{% url 'changepassword' %}" method="post">
                            {% csrf_token %}
                            <div class="mb-2">
                                <label class="mb-2 text-muted" for="email">Old Password </label>
                                <div class="input-group mb-3">
                                    <input type="password"  maxlength = "50" name="old_password" class="form-control" id="old_password" aria-describedby="button-addon2" required autofocus>
                                    <div class="input-group-append">
                                        <button class="btn btn-outline-secondary" type="button" id="button-addon2" onclick="show_password('old_password')"><img src="{% static 'servicesupport/eye.svg' %}"></button>
                                    </div>    
                                </div> 
                            </div>
                            <div class="mb-2">
                                <label class="mb-2 text-muted" for="email">New Password </label>
                                <div class="input-group mb-3">
                                    <input type="password" maxlength = "50" name="new_password" class="form-control" id="new_password"  aria-describedby="button-addon2" required >
                                    <div class="input-group-append">
                                        <button class="btn btn-outline-secondary" style="font-size: 20;" type="button" id="button-addon2" onclick="show_password('new_password')"><img src="{% static 'servicesupport/eye.svg' %}"></button>
                                    </div>    
                                </div> 
                            <div class="mb-2">
                                <label class="mb-2 text-muted" for="email">Renew Password </label>
                                <div class="input-group mb-3">
                                    <input  type="password" maxlength = "50" name="renew_password" class="form-control" id="renew_password"  aria-describedby="button-addon2" required >
                                    <div class="input-group-append">
                                        <button class="btn btn-outline-secondary" type="button" id="button-addon2" onclick="show_password('renew_password')"><img src="{% static 'servicesupport/eye.svg' %}"></button>
                                    </div>    
                                </div> 
                            </div>
                            
                            <div class="d-flex align-items-center">
                                <button type="submit" class="btn btn-primary ms-auto">
                                    Submit
                                </button>
                            </div>
                        </form>
                    </div>
                    <div class="card-footer py-3 border-0">
                        <div class="text-center">
                            Go to  <b>Home Page</b> <a href="{% url 'index' %}" class="text-dark">link</a>
                        </div>
                    </div>
                </div>
                <div class="text-center mt-5 text-muted">
                    Copyright &copy; 2023 &mdash; ServiceSupport
                </div>
            </div>
        </div>
    </div>
</section> 
<script>
    function show_password(ID) {
      let x = document.getElementById(ID);
      if (x.type === "password") {
        x.type = "text";
      } else {
        x.type = "password";
      }
    }
</script>
