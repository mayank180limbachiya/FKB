{% extends "servicesupport/layout.html" %}
{% block body %}
{% load static %}
<br>
<div class="container">
    <div class="table-responsive">
    <table class="table table-striped table-bordered table-hover ">
        <thead>
            <tr>
                <th scope="col">#</th>
                <th scope="col">Product</th>
                <th scope="col">Manual Number</th>
                <th scope="col">Manual Name</th>
                <th scope="col">Link</th>
            </tr>
        </thead>      
        <tbody>
        {% for manualdata in manual %}
        <tr>
            <th class="text-end" scope="row">{{forloop.counter}}</th>
            <td style="white-space: nowrap;">{{manualdata.Product_name}}</td>
            <td style="white-space: nowrap;">{{manualdata.Manual_number}}</td>
            <td>{{manualdata.Manual_Name}}</td>
            <td>
            <form method="get" action="{% url 'pdf' %}">
                {% csrf_token %}
                <button type="submit"  id="link" name="link" value="{{manualdata.Manual_storage.url}}" class="btn btn-link btn-sm">Open</button>
            </form>
            </td>
            <!--<td><a href="{% static manualdata.Manual_storage.url %}" target="_new"class="link">Open</a></td>-->
            <!--<td><a href="/static{{manualdata.Manual_storage.url}}" target="_new" class="link">Open</a></td>-->
        </tr>
        {% endfor %}
        </tbody>
    </table>   
    </div> 
</div>    







{% endblock %}
