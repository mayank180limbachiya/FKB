{% extends "servicesupport/layout.html" %}
{% block title %}Document Viewer — Service Support{% endblock %}
{% block extra_head %}
<style>
  #pdf-frame { display:block; width:100%; border:none; }
</style>
<script>
  function sizePdf(){
    var el=document.getElementById('pdf-frame');
    el.style.height=(window.innerHeight - el.getBoundingClientRect().top - 2)+'px';
  }
  window.addEventListener('load',sizePdf);
  window.addEventListener('resize',sizePdf);
</script>
{% endblock %}
{% block body %}
{% load static %}
<div class="bg-brand-dark border-b border-slate-700 px-3 sm:px-5 py-2 flex items-center gap-3">
  <button onclick="history.back()" class="min-h-[36px] font-mono text-xs text-slate-400 hover:text-brand-yellow transition">← Back</button>
  <span class="text-slate-600 text-xs font-mono truncate hidden sm:block">{{ link }}</span>
</div>
<iframe id="pdf-frame" src="{% static '/pdf_view/web/viewer.html' %}?file={% static link %}" frameborder="0"></iframe>
{% endblock %}
